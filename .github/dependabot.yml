version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      astro:
        patterns:
          - "astro"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
